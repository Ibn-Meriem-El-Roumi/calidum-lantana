<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex">
    <main>
        <div class="card flex jc-center ai-center">
            <img src="credit-card-clipart-design-illustration-free-png.webp" alt="">
        </div>
        <div class="form flex jc-center ai-center">
            <form>
                <div class="field">
                    <label for="email">Email</label>
                    <input type="email" name="email" id="email">
                </div>
                <div class="field">
                    <label for="pass">Password</label>
                    <input type="password" name="pass" id="pass" autocomplete="">
                </div>

                <button type="submit">Login</button>
            </form>
        </div>
    </main>
</body>
</html>
