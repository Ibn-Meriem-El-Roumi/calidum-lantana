<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation Demo</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="demo">
      <h1>Animation Showcase</h1>
      <p>Hover over the elements to see the transitions.</p>

      <img src="Salami-pizza-hero.avif" alt="">

      <div class="demo-grid">
        <div class="box"></div>
        <button class="btn" type="button">Hover Me</button>
        <article class="card">
          <h2>Animated Card</h2>
          <p>This card lifts and glows when you hover over it.</p>
        </article>
      </div>
    </main>
  </body>
</html>
