<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Pet Gallery</h1>
    <div class="grid-container">
        <div class="pet-card">
            <img src="https://picsum.photos/seed/pet1/300/200" alt="Luna the cat">
            <h3>Luna</h3>
            <p>Species: Cat</p>
        </div>
        <div class="pet-card">
            <img src="https://picsum.photos/seed/pet2/300/200" alt="Milo the dog">
            <h3>Milo</h3>
            <p>Species: Dog</p>
        </div>
        <div class="pet-card">
            <img src="https://picsum.photos/seed/pet3/300/200" alt="Coco the parrot">
            <h3>Coco</h3>
            <p>Species: Parrot</p>
        </div>
        <div class="pet-card">
            <img src="https://picsum.photos/seed/pet4/300/200" alt="Ollie the rabbit">
            <h3>Ollie</h3>
            <p>Species: Rabbit</p>
        </div>
        <div class="pet-card">
            <img src="https://picsum.photos/seed/pet5/300/200" alt="Nala the guinea pig">
            <h3>Nala</h3>
            <p>Species: Guinea pig</p>
        </div>
        <div class="pet-card">
            <img src="https://picsum.photos/seed/pet6/300/200" alt="Finn the turtle">
            <h3>Finn</h3>
            <p>Species: Turtle</p>
        </div>
        <div class="pet-card">
            <img src="https://picsum.photos/seed/pet7/300/200" alt="Bella the hamster">
            <h3>Bella</h3>
            <p>Species: Hamster</p>
        </div>
        <div class="pet-card ziggy">
            <img src="https://picsum.photos/seed/pet8/300/200" alt="Ziggy the fish">
            <h3>Ziggy</h3>
            <p>Species: Fish</p>
        </div>
    </div>
</body>
</html>
